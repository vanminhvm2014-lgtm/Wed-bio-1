<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lionz_01x Bio</title>
<link rel="icon" type="image/png" href="{{ICON}}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --accent: #2de2ff;
    --accent-2: #b14bff;
    --bg-1: #05060c;
    --card-bg-1: rgba(14, 18, 42, 0.85);
    --card-bg-2: rgba(58, 18, 88, 0.8);
    --card-border: rgba(255,255,255,0.08);
    --text-main: #eef3fb;
    --text-sub: #8b97b3;
    --font-display: 'Orbitron', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --font-body: 'Inter', sans-serif;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }

  body{
    min-height:100vh;
    font-family: var(--font-body);
    color: var(--text-main);
    background: var(--bg-1);
    display:flex; align-items:center; justify-content:center;
    padding: 40px 16px;
    overflow-x:hidden;
    position:relative;
  }

  /* ===== NỀN TRANG ===== */
  .bg-image{
    position:fixed; inset:0; z-index:0;
    background-image: url('assets/background.gif');
    background-size:cover; background-position:center;
  }
  .bg-image::after{
    content:''; position:absolute; inset:0;
    background: radial-gradient(circle at 50% 35%, rgba(6,8,20,0.35), rgba(5,6,12,0.85) 75%);
  }
  .scanlines{
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background: repeating-linear-gradient(180deg, rgba(255,255,255,0.035) 0px, transparent 1px, transparent 3px);
    mix-blend-mode: overlay;
    opacity:0.5;
  }

  /* ===== FRAME / CARD ===== */
  .frame{
    position:relative; z-index:2;
    width:100%; max-width:380px;
    border-radius:22px;
    padding:1.5px;
    background: linear-gradient(145deg, var(--accent), var(--accent-2));
    animation: rise .55s ease both, float-bounce 3.2s ease-in-out .55s infinite;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 25px 70px rgba(0,0,0,0.55);
  }
  @keyframes rise{ from{ opacity:0; transform: translateY(16px); } to{ opacity:1; transform:none; } }
  @keyframes float-bounce{
    0%, 100%{ transform: translateY(0); }
    50%{ transform: translateY(-10px); }
  }

  .corner{ position:absolute; width:16px; height:16px; z-index:3; }
  .corner.tl{ top:-7px; left:-7px; border-top:2px solid var(--accent); border-left:2px solid var(--accent); border-radius:4px 0 0 0; }
  .corner.tr{ top:-7px; right:-7px; border-top:2px solid var(--accent-2); border-right:2px solid var(--accent-2); border-radius:0 4px 0 0; }
  .corner.bl{ bottom:-7px; left:-7px; border-bottom:2px solid var(--accent-2); border-left:2px solid var(--accent-2); border-radius:0 0 0 4px; }
  .corner.br{ bottom:-7px; right:-7px; border-bottom:2px solid var(--accent); border-right:2px solid var(--accent); border-radius:0 0 4px 0; }

  .card{
    position:relative;
    border-radius:20.5px;
    background: linear-gradient(165deg, var(--card-bg-1), var(--card-bg-2));
    padding: 0 24px 26px;
    text-align:left;
    backdrop-filter: blur(16px);
    overflow:hidden;
  }
  .card::before{
    content:''; position:absolute; inset:0;
    background: repeating-linear-gradient(90deg, rgba(255,255,255,0.015) 0px, transparent 1px, transparent 26px);
    pointer-events:none;
  }

  /* ===== BANNER ẢNH TRÊN CÙNG (đã kéo lên) ===== */
  .profile-banner{
    width: calc(100% + 48px);
    margin: -46px -24px 8px; /* Kéo banner lên */
    height: 150px; /* Tùy chỉnh nếu cần */
    object-fit: cover;
    display:block;
    border-top-left-radius:20.5px;
    border-top-right-radius:20.5px;
  }

  /* ===== AVATAR (đè lên mép banner) ===== */
  .avatar-wrap{
    position:relative;
    width:92px; height:92px; /* Kích thước avatar */
    margin: -72px 0 0 12px; /* Kéo avatar lên; thay đổi giá trị âm để kéo cao hơn */
    border-radius:50%;
    padding:3px;
    background: conic-gradient(var(--accent), var(--accent-2), var(--accent));
    box-shadow: 0 0 28px rgba(45,226,255,0.35);
    z-index:6; /* đảm bảo avatar nằm trên banner và thẻ */
    overflow:visible;
  }
  .avatar-img{
    width:100%; height:100%; border-radius:50%;
    display:block;
    object-fit:cover;
    border: 4px solid var(--bg-1);
    background-color: transparent;
  }
  .status-dot{
    position:absolute; width:15px; height:15px; right:-1px; bottom:-1px;
    background:#23ff9d; border-radius:50%;
    border:3px solid var(--bg-1);
    box-shadow: 0 0 8px #23ff9d;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.15); } }

  /* ===== THẺ TÊN ===== */
  .name-card{
    margin: 16px 0 14px;
    padding:14px 16px;
    border:1px solid var(--card-border);
    border-radius:14px;
    background: rgba(255,255,255,0.03);
  }
  .username{
    font-family: var(--font-display);
    font-size: 19px; font-weight:700;
    letter-spacing: .4px;
    margin: 0 0 3px;
    text-shadow: 0 0 16px rgba(45,226,255,0.4);
  }
  .uid{
    font-family: var(--font-mono);
    font-size: 12px; color: var(--text-sub);
    letter-spacing:.3px;
  }

  /* ===== ABOUT ME ===== */
  .about{
    text-align:left;
    margin-bottom:18px;
    padding:14px 16px;
    border:1px solid var(--card-border);
    border-radius:12px;
    background: rgba(255,255,255,0.03);
  }
  .about-title{
    font-family: var(--font-mono);
    font-size:10px; letter-spacing:1.5px;
    color: var(--accent);
    margin-bottom:6px; opacity:.85;
  }
  .about-text{
    font-size:13.5px; color: var(--text-sub); line-height:1.5;
  }

  /* ===== HÀNG ICON TRÒN ===== */
  .icon-row{ display:flex; justify-content:center; gap:14px; margin: 4px 0 18px; }
  .icon-circle{
    width:46px; height:46px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background: rgba(255,255,255,0.05);
    border:1px solid var(--card-border);
    color: var(--text-main);
    text-decoration:none;
    transition: transform .15s ease, background .2s ease, border-color .2s ease;
  }
  .icon-circle svg{ width:19px; height:19px; stroke: var(--accent); }
  .icon-circle:hover{
    transform: translateY(-3px);
    background: var(--accent);
    border-color: var(--accent);
  }
  .icon-circle:hover svg{ stroke: var(--bg-1); }

  .views{
    font-family: var(--font-mono);
    font-size: 11px; color: var(--text-sub);
    display:flex; align-items:center; justify-content:center; gap:6px;
    letter-spacing:.3px;
  }
  .views svg{ width:13px; height:13px; stroke: var(--text-sub); }

  @media (prefers-reduced-motion: reduce){
    .frame{ animation: rise .55s ease both; }
    .status-dot{ animation:none; }
  }

  /* ===== SPLASH ===== */
  #splash{
    position:fixed; inset:0; z-index:20;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:22px;
    background: var(--bg-1);
    transition: opacity .5s ease, visibility .5s ease;
    overflow:hidden;
  }
  #splash.hide{ opacity:0; visibility:hidden; pointer-events:none; }
  .splash-scan{
    position:absolute; left:0; right:0; height:2px; top:10%;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 2.4s linear infinite;
    opacity:0.7;
  }
  @keyframes scan{ 0%{ top:8%; } 100%{ top:88%; } }

  .splash-text{
    font-family: var(--font-mono);
    font-size: 13px; letter-spacing:.5px;
    color: var(--accent);
    min-height:18px;
    z-index:1;
  }
  .splash-text .cursor{ animation: blink 1s step-end infinite; }
  @keyframes blink{ 50%{ opacity:0; } }

  .enter-btn{
    padding:13px 36px;
    border-radius:30px;
    border:1px solid var(--accent);
    background: transparent;
    color: var(--text-main);
    font-family: var(--font-mono);
    font-size:13px; font-weight:600; letter-spacing:1px;
    cursor:pointer;
    opacity:0; transform: translateY(6px);
    transition: opacity .4s ease, transform .4s ease, background .2s ease, box-shadow .2s ease;
    z-index:1;
  }
  .enter-btn.show{ opacity:1; transform:none; }
  .enter-btn:hover{ background: var(--accent); color: var(--bg-1); box-shadow: 0 0 24px rgba(45,226,255,0.5); }

  body.locked{ overflow:hidden; }
  .main-content{ transition: opacity .5s ease; }
  .main-content.hidden{ opacity:0; }

  /* ===== NÚT NHẠC ===== */
  .music-btn{
    position:fixed; bottom:18px; right:18px; z-index:5;
    width:44px; height:44px; border-radius:50%;
    border:1px solid var(--accent);
    background: rgba(10,14,28,0.7);
    color: var(--accent);
    font-size:16px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    backdrop-filter: blur(8px);
    transition: background .2s ease, color .2s ease;
  }
  .music-btn:hover{ background: var(--accent); color: var(--bg-1); }
</style>
</head>
<body class="locked">

  <!-- MÀN HÌNH CHỜ -->
  <div id="splash">
    <div class="splash-scan"></div>
    <div class="splash-text" id="splashText"><span class="cursor">_</span></div>
    <button class="enter-btn" id="enterBtn">VÀO TRANG</button>
  </div>

  <div class="bg-image"></div>
  <div class="scanlines"></div>

  <div class="frame main-content hidden" id="mainContent">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>
    <div class="card">
      <!-- SỬ DỤNG banner bạn cung cấp (đặt file vào assets/banner.gif) -->
      <img class="profile-banner" src="assets/banner.gif" alt="banner">

      <div class="avatar-wrap">
        <!-- SỬ DỤNG avatar bạn cung cấp (đặt file vào assets/avatar.png) -->
        <img class="avatar-img" src="assets/avatar.png" alt="avatar">
        <span class="status-dot"></span>
      </div>

      <!-- ĐỔI TÊN HIỂN THỊ -->
      <div class="name-card">
        <div class="username">Lionz_01x ᶻ 𝘇 𐰁</div>
        <div class="uid">@lionz_01x</div>
      </div>

      <!-- ABOUT ME -->
      <div class="about">
        <div class="about-title">ABOUT ME</div>
        <!-- ĐỔI NỘI DUNG ABOUT ME -->
        <div class="about-text">Hi, I'm Lionz</div>
      </div>

      <!-- HÀNG ICON -->
      <div class="icon-row">
        <a class="icon-circle" href="https://github.com/lionz01x" target="_blank" rel="noopener" title="GitHub">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.5c0-1 .1-1.4-.5-2 2.8-.3 5.5-1.4 5.5-6a4.6 4.6 0 0 0-1.3-3.2 4.2 4.2 0 0 0-.1-3.2s-1.1-.3-3.5 1.3a12.3 12.3 0 0 0-6.2 0C7.5 4.8 6.4 5.1 6.4 5.1a4.2 4.2 0 0 0-.1 3.2A4.6 4.6 0 0 0 5 11.5c0 4.6 2.7 5.7 5.5 6-.6.6-.6 1.2-.5 2V23"/></svg>
        </a>
        <a class="icon-circle" href="https://discord.com/users/1385190601368277063" target="_blank" rel="noopener" title="Discord">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><path d="M7 6.5C9.5 5.5 14.5 5.5 17 6.5c1.5 2 2 5 1.7 8.3-1.8 1.4-3.5 2.1-3.5 2.1l-.8-1.5M7 6.5C4.5 7.5 4 10.5 4.3 13.8c1.8 1.4 3.5 2.1 3.5 2.1l.8-1.5"/></svg>
        </a>
      </div>

      <div class="views">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        <span id="viewCount">—</span> LƯỢT XEM
      </div>
    </div>
  </div>

  <div style="position:fixed; width:1px; height:1px; opacity:0; pointer-events:none;">
    <div id="music-player"></div>
  </div>
  <button class="music-btn" id="musicToggle" title="Bật/tắt nhạc">♪</button>

  <script>
    // Bộ đếm lượt xem (lưu trên trình duyệt người xem, chỉ minh hoạ)
    const key = 'bio_view_count';
    let count = parseInt(localStorage.getItem(key) || '200', 10);
    count += 1;
    localStorage.setItem(key, count);
    document.getElementById('viewCount').textContent = count.toLocaleString('vi-VN');

    // ===== Boot text màn hình chờ =====
    const splashLines = ['> initializing session...', '> loading profile data...', '> connection secure.', '> ready.'];
    const splashTextEl = document.getElementById('splashText');
    const enterBtn = document.getElementById('enterBtn');
    let i = 0;
    function typeLine(){
      if(i < splashLines.length){
        splashTextEl.innerHTML = splashLines[i] + '<span class="cursor">_</span>';
        i++;
        setTimeout(typeLine, 650);
      } else {
        enterBtn.classList.add('show');
      }
    }
    typeLine();

    enterBtn.addEventListener('click', () => {
      document.getElementById('splash').classList.add('hide');
      document.body.classList.remove('locked');
      document.querySelectorAll('.main-content').forEach(el => el.classList.remove('hidden'));
    });

    // ===== Nhạc nền (dùng YouTube IFrame API cho ổn định) =====
    const VIDEO_ID = 'bzy3wo5ybRs';
    let ytPlayer = null;
    let musicReady = false;
    let musicPlaying = true;
    let unmuted = false;

    const ytScript = document.createElement('script');
    ytScript.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(ytScript);

    window.onYouTubeIframeAPIReady = function(){
      ytPlayer = new YT.Player('music-player', {
        height: '1', width: '1', videoId: VIDEO_ID,
        playerVars: {
          autoplay: 1, mute: 1, loop: 1, playlist: VIDEO_ID,
          controls: 0, disablekb: 1
        },
        events: {
          onReady: function(e){ musicReady = true; e.target.playVideo(); }
        }
      });
    };

    function unmuteMusic(){
      if(unmuted || !musicReady) return;
      unmuted = true;
      ytPlayer.unMute();
      ytPlayer.playVideo();
      document.removeEventListener('click', unmuteMusic);
      document.removeEventListener('keydown', unmuteMusic);
    }
    document.addEventListener('click', unmuteMusic);
    document.addEventListener('keydown', unmuteMusic);

    document.getElementById('musicToggle').addEventListener('click', function(e){
      e.stopPropagation();
      if(!musicReady) return;
      if(musicPlaying){ ytPlayer.pauseVideo(); } else { ytPlayer.playVideo(); unmuteMusic(); }
      musicPlaying = !musicPlaying;
      document.getElementById('musicToggle').textContent = musicPlaying ? '♪' : '♫';
    });
  </script>

</body>
</html>
